<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书智能经营助手 - Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#0f172a;color:#e2e8f0;display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e1b4b;padding:20px 0;border-right:1px solid rgba(255,255,255,0.1);position:fixed;height:100vh;overflow-y:auto;z-index:100}
.sidebar h2{padding:0 20px;font-size:14px;color:#a78bfa;margin-bottom:20px}
.sidebar a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:#94a3b8;text-decoration:none;font-size:14px;transition:all .2s;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:rgba(139,92,246,0.15);color:#fff;border-right:3px solid #7c3aed}
.main{margin-left:220px;flex:1;padding:24px;min-height:100vh}
.banner{background:linear-gradient(90deg,#7c3aed,#2563eb);padding:10px 20px;border-radius:8px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.banner a{color:#fff;text-decoration:underline}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:12px;padding:20px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700;color:#a78bfa}
.stat-card .label{font-size:12px;color:#94a3b8;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06)}
th{color:#94a3b8;font-weight:500}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,0.2);color:#4ade80}
.badge-yellow{background:rgba(234,179,8,0.2);color:#facc15}
.badge-blue{background:rgba(59,130,246,0.2);color:#60a5fa}
.badge-red{background:rgba(239,68,68,0.2);color:#f87171}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:#7c3aed;color:#fff}.btn-primary:hover{background:#6d28d9}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#e2e8f0}.btn-outline:hover{background:rgba(255,255,255,0.05)}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-yellow{background:#ca8a04;color:#fff}.btn-yellow:hover{background:#a16207}
input,select,textarea{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#7c3aed}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto}
.modal-wide{max-width:750px}
.modal h3{margin-bottom:16px}
.loading{text-align:center;padding:40px;color:#94a3b8}
.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .3s}
.note-preview{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:16px;margin:12px 0;white-space:pre-wrap;font-size:13px;line-height:1.8;max-height:300px;overflow-y:auto}
.version-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;margin-bottom:12px}
.version-card h4{color:#a78bfa;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.version-card .meta{font-size:11px;color:#94a3b8;margin-bottom:8px}
.version-card .content{font-size:13px;line-height:1.8;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-bottom:12px;padding:8px;background:rgba(0,0,0,0.2);border-radius:8px}
.version-card .actions{display:flex;gap:6px;flex-wrap:wrap}
.link{color:#60a5fa;text-decoration:underline;cursor:pointer;font-size:12px}
.link:hover{color:#93c5fd}
.hidden{display:none}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-sm{display:flex;gap:8px}
.mt-sm{margin-top:12px}
.mb-sm{margin-bottom:12px}
.text-sm{font-size:12px;color:#94a3b8}
.text-center{text-align:center}
.order-detail{font-size:12px;color:#94a3b8;margin-top:4px}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>

<nav class="sidebar">
  <h2>📱 XHS 助手</h2>
  <a href="#" class="active" onclick="switchTab('dashboard')">📊 数据看板</a>
  <a href="#" onclick="switchTab('products')">📦 商品管理</a>
  <a href="#" onclick="switchTab('content')">✨ 内容中心</a>
  <a href="#" onclick="switchTab('orders')">🔄 订单管理</a>
  <a href="/" style="margin-top:40px;opacity:0.6">← 返回首页</a>
</nav>

<div class="main">
  <div class="banner">
    <span>🚀 Demo 演示模式 — 数据来自真实 API（首次加载可能需等待30秒冷启动）</span>
    <a href="/">返回产品介绍</a>
  </div>

  <!-- 数据看板 -->
  <div id="tab-dashboard">
    <h2 style="margin-bottom:16px">数据看板</h2>
    <div class="stats" id="dashboard-stats"><div class="loading">加载中...</div></div>
  </div>

  <!-- 商品管理 -->
  <div id="tab-products" class="hidden">
    <div class="flex-between mb-sm">
      <h2>商品管理</h2>
      <button class="btn btn-primary" onclick="showSpreadModal()">+ 一键铺货</button>
    </div>
    <div class="card">
      <table><thead><tr><th>商品</th><th>成本</th><th>售价</th><th>利润率</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="product-list"><tr><td colspan="6" class="loading">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <!-- 内容中心 -->
  <div id="tab-content" class="hidden">
    <div class="flex-between mb-sm">
      <h2>内容中心</h2>
      <button class="btn btn-primary" onclick="showNoteModal()">✨ AI生成笔记</button>
    </div>
    <div class="card">
      <table><thead><tr><th>标题</th><th>风格</th><th>人群</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="note-list"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <!-- 订单管理 -->
  <div id="tab-orders" class="hidden">
    <div class="flex-between mb-sm">
      <h2>订单管理</h2>
      <div class="gap-sm"><button class="btn btn-outline" onclick="syncOrders()">🔄 同步订单</button></div>
    </div>
    <div class="card">
      <table><thead><tr><th>订单号</th><th>商品</th><th>金额</th><th>物流</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="order-list"><tr><td colspan="6" class="loading">加载中...</td></tr></tbody></table>
    </div>
  </div>
</div>

<!-- ========== 铺货弹窗 ========== -->
<div class="modal-overlay" id="spread-modal">
  <div class="modal">
    <h3>一键铺货</h3>
    <div id="spread-step1">
      <div class="form-group"><label>搜索1688商品</label><input id="spread-keyword" placeholder="输入关键词，如：连衣裙" onkeydown="if(event.key==='Enter')searchProducts()"></div>
      <button class="btn btn-primary" onclick="searchProducts()" style="width:100%">搜索</button>
      <div id="spread-results" style="margin-top:12px"></div>
    </div>
    <div id="spread-step2" class="hidden">
      <p id="spread-selected-info" class="mb-sm"></p>
      <div class="form-group"><label>定价倍率</label><input id="spread-multiplier" type="number" value="2.5" min="1.5" max="5" step="0.1"></div>
      <button class="btn btn-primary" onclick="doSpread()" style="width:100%">开始铺货</button>
    </div>
    <div id="spread-step3" class="hidden">
      <p>铺货进行中...</p>
      <div class="progress-bar"><div class="fill" id="spread-progress" style="width:0%"></div></div>
      <p id="spread-status-text" class="text-sm"></p>
    </div>
    <div id="spread-step4" class="hidden text-center" style="padding:20px">
      <p style="font-size:24px">✅</p><p style="font-weight:600;margin:8px 0">铺货成功！</p>
      <p id="spread-product-name" class="text-sm mb-sm"></p>
      <div class="gap-sm" style="justify-content:center">
        <button class="btn btn-primary" onclick="goGenerateNote()">📝 去生成笔记</button>
        <button class="btn btn-outline" onclick="closeSpreadModal();switchTab('products')">查看商品列表</button>
      </div>
    </div>
    <button class="btn btn-outline" onclick="closeSpreadModal()" style="width:100%;margin-top:12px">关闭</button>
  </div>
</div>

<!-- ========== 笔记生成弹窗（多版本测款） ========== -->
<div class="modal-overlay" id="note-modal">
  <div class="modal modal-wide">
    <h3>AI 生成笔记 — 多版本测款</h3>
    <div id="note-form">
      <div class="form-group">
        <label>快捷选择已铺货商品（可选，不选则自由创作）</label>
        <select id="note-product-select" onchange="onProductSelect()">
          <option value="">-- 手动输入商品名 --</option>
        </select>
      </div>
      <div class="form-group"><label>创作主题（可输入商品名、话题、任意内容）</label><input id="note-title" placeholder="如：碎花连衣裙、夏日防晒攻略、租房避坑指南..."></div>
      <div class="form-group">
        <label>目标人群（可多选，生成多个版本）</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px" id="audience-checkboxes">
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="student" checked onchange="updateAudienceStyle()"> 学生党</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="office" checked onchange="updateAudienceStyle()"> 上班族</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="mom" onchange="updateAudienceStyle()"> 宝妈</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="fashion" onchange="updateAudienceStyle()"> 潮流青年</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="general" onchange="updateAudienceStyle()"> 通用</label>
        </div>
      </div>
      <div class="form-group">
        <label>文案风格（可多选）</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px" id="style-checkboxes">
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="grass_planting" checked onchange="updateAudienceStyle()"> 种草推荐</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="review" checked onchange="updateAudienceStyle()"> 真实测评</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px"><input type="checkbox" value="tutorial" onchange="updateAudienceStyle()"> 教程攻略</label>
        </div>
      </div>
      <p id="version-preview" class="text-sm mb-sm">预计生成 4 个版本</p>
      <button class="btn btn-primary" onclick="generateMultiNotes()" style="width:100%">🚀 生成多版本笔记</button>
    </div>
    <div id="note-loading" class="hidden loading">AI 正在创作多版本笔记，请稍候...</div>
    <div id="note-results" class="hidden">
      <h4 style="color:#a78bfa;margin-bottom:12px" id="note-results-title"></h4>
      <div id="note-version-list"></div>
      <div class="gap-sm mt-sm" style="justify-content:center">
        <button class="btn btn-outline" onclick="document.getElementById('note-results').classList.add('hidden');document.getElementById('note-form').classList.remove('hidden')">重新生成全部</button>
      </div>
    </div>
    <button class="btn btn-outline" onclick="closeNoteModal()" style="width:100%;margin-top:12px">关闭</button>
  </div>
</div>

<!-- ========== 编辑笔记弹窗 ========== -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>编辑笔记</h3>
    <div class="form-group"><label>标题</label><input id="edit-title"></div>
    <div class="form-group"><label>内容</label><textarea id="edit-content" rows="10" style="resize:vertical"></textarea></div>
    <button class="btn btn-primary" onclick="saveEdit()" style="width:100%">保存修改</button>
    <button class="btn btn-outline" onclick="document.getElementById('edit-modal').classList.remove('show')" style="width:100%;margin-top:8px">取消</button>
  </div>
</div>

<script>
const API = '';
let currentNote = null;
let selectedProduct = null;
let spreadProductTitle = '';
let multiVersions = [];
let editingVersion = null;
let productCache = [];

// ============ Tab切换 ============
function switchTab(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  if (tab === 'dashboard') loadDashboard();
  if (tab === 'products') loadProducts();
  if (tab === 'content') loadNotes();
  if (tab === 'orders') loadOrders();
}

// ============ 数据看板 ============
async function loadDashboard() {
  try {
    const res = await fetch(API + '/api/v1/dashboard/overview');
    const d = await res.json();
    if (d.code === 0) {
      const s = d.data;
      document.getElementById('dashboard-stats').innerHTML = `
        <div class="stat-card"><div class="num">¥${s.gmv||0}</div><div class="label">GMV</div></div>
        <div class="stat-card"><div class="num">${s.orderCount||0}</div><div class="label">订单数</div></div>
        <div class="stat-card"><div class="num">¥${s.profitTotal||0}</div><div class="label">总利润</div></div>
        <div class="stat-card"><div class="num">${s.noteCount||0}</div><div class="label">笔记数</div></div>
        <div class="stat-card"><div class="num">${s.totalViews||0}</div><div class="label">总浏览</div></div>
        <div class="stat-card"><div class="num">${s.conversionRate||0}%</div><div class="label">转化率</div></div>`;
    }
  } catch(e) { document.getElementById('dashboard-stats').innerHTML = '<div class="loading">API 冷启动中，请等待30秒后刷新...</div>'; }
}

// ============ 商品列表 ============
async function loadProducts() {
  try {
    const res = await fetch(API + '/api/v1/products');
    const d = await res.json();
    const list = d.data?.products || [];
    productCache = list;
    if (list.length === 0) { document.getElementById('product-list').innerHTML = '<tr><td colspan="6" class="text-center" style="color:#94a3b8">暂无商品，点击"一键铺货"开始</td></tr>'; return; }
    document.getElementById('product-list').innerHTML = list.map(p => `<tr>
      <td>${(p.title||'').substring(0,20)}...</td>
      <td>¥${p.costPrice||0}</td>
      <td style="color:#f87171;font-weight:600">¥${p.sellPrice||0}</td>
      <td><span class="badge badge-green">${p.profitMargin||0}%</span></td>
      <td><span class="badge badge-blue">${p.status||'已铺货'}</span></td>
      <td><button class="btn btn-sm btn-primary" onclick="goGenerateNoteWithProduct('${(p.title||'').replace(/'/g,"\\'")}')">📝 生成笔记</button></td>
    </tr>`).join('');
  } catch(e) { document.getElementById('product-list').innerHTML = '<tr><td colspan="6" class="loading">加载失败</td></tr>'; }
}

// ============ 笔记列表 ============
async function loadNotes() {
  try {
    const res = await fetch(API + '/api/v1/notes');
    const d = await res.json();
    const list = d.data?.notes || [];
    if (list.length === 0) { document.getElementById('note-list').innerHTML = '<tr><td colspan="5" class="text-center" style="color:#94a3b8">暂无笔记，点击"AI生成笔记"开始</td></tr>'; return; }
    const styleMap = {grass_planting:'种草',review:'测评',tutorial:'教程'};
    const audMap = {student:'学生党',office:'上班族',mom:'宝妈',fashion:'潮流青年',general:'通用'};
    document.getElementById('note-list').innerHTML = list.map(n => `<tr>
      <td>${(n.title||'').substring(0,25)}...</td>
      <td>${styleMap[n.style]||n.style||'-'}</td>
      <td>${audMap[n.targetAudience]||n.targetAudience||'-'}</td>
      <td><span class="badge ${n.status==='READY'?'badge-green':'badge-yellow'}">${n.status||'DRAFT'}</span></td>
      <td><button class="btn btn-sm btn-outline" onclick="viewNote('${(n.title||'').replace(/'/g,"\\'")}','${(n.content||'').replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">查看</button></td>
    </tr>`).join('');
  } catch(e) {}
}

function viewNote(title, content) {
  alert('标题: ' + title + '\n\n内容:\n' + content);
}

// ============ 订单列表（增强版） ============
async function loadOrders() {
  try {
    const res = await fetch(API + '/api/v1/orders');
    const d = await res.json();
    const list = d.data?.orders || [];
    const statusBadge = s => s==='SHIPPED'?'badge-green':s==='PENDING'?'badge-yellow':s==='SOURCING'?'badge-blue':s==='CANCELLED'?'badge-red':'badge-green';
    document.getElementById('order-list').innerHTML = list.map(o => `<tr>
      <td>${o.id||'-'}</td>
      <td>${(o.product||'-').substring(0,15)}</td>
      <td>¥${o.amount||0}</td>
      <td>
        <div>${o.trackingNumber ? '📦 '+o.trackingNumber : '<span class="text-sm">待发货</span>'}</div>
        <div class="order-detail">${o.logisticsStatus || ''}</div>
      </td>
      <td><span class="badge ${statusBadge(o.status)}">${o.localStatus||o.status||'-'}</span></td>
      <td>
        <div class="gap-sm">
          ${o.status==='PENDING' ? `<button class="btn btn-sm btn-primary" onclick="shipOrder('${o.id}')">发货</button>` : ''}
          ${o.sourceOrderId ? `<a class="link" href="https://detail.1688.com/offer/${o.sourceOrderId}.html" target="_blank">1688详情</a>` : ''}
          <button class="btn btn-sm btn-outline" onclick="openCustomerService('${o.id}')">💬 客服</button>
        </div>
      </td>
    </tr>`).join('');
  } catch(e) { document.getElementById('order-list').innerHTML = '<tr><td colspan="6" class="loading">加载失败</td></tr>'; }
}

async function syncOrders() {
  try {
    await fetch(API + '/api/v1/orders/sync', {method:'POST'});
    loadOrders();
    alert('同步完成！');
  } catch(e) { alert('同步失败: ' + e.message); }
}

async function shipOrder(id) {
  try {
    const res = await fetch(API + '/api/v1/orders/' + id + '/ship', {method:'POST'});
    const d = await res.json();
    if (d.code === 0) alert('发货成功！物流单号：' + (d.data?.trackingNumber||''));
    else alert(d.message||'发货失败');
    loadOrders();
  } catch(e) { alert('发货失败: ' + e.message); }
}

function openCustomerService(orderId) {
  const msg = encodeURIComponent('订单号: ' + orderId + '，您好，有什么可以帮您？');
  alert('客服消息入口\n\n订单号: ' + orderId + '\n\n（实际环境会跳转到客服IM系统）\n消息: ' + decodeURIComponent(msg));
}

// ============ 铺货流程 ============
function showSpreadModal() { document.getElementById('spread-modal').classList.add('show'); resetSpread(); }
function closeSpreadModal() { document.getElementById('spread-modal').classList.remove('show'); }
function resetSpread() {
  ['spread-step1','spread-step2','spread-step3','spread-step4'].forEach((id,i) => document.getElementById(id).classList.toggle('hidden',i!==0));
  document.getElementById('spread-results').innerHTML='';
  spreadProductTitle = '';
}

async function searchProducts() {
  const kw = document.getElementById('spread-keyword').value;
  if (!kw) { alert('请输入搜索关键词'); return; }
  try {
    const res = await fetch(API + '/api/v1/source-products?keyword=' + encodeURIComponent(kw));
    const d = await res.json();
    const products = d.data?.products || [];
    if (products.length === 0) { document.getElementById('spread-results').innerHTML = '<p class="text-sm text-center">未找到商品</p>'; return; }
    document.getElementById('spread-results').innerHTML = products.map(p => `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid rgba(255,255,255,0.05)">
      <div><b>${(p.title||'').substring(0,20)}</b><br><span style="color:#f87171">¥${p.price||0}</span> · ${p.supplier||'1688'}</div>
      <button class="btn btn-sm btn-primary" onclick="selectProduct('${p.id}','${(p.title||'').replace(/'/g,"\\'")}',${p.price||0})">选择</button>
    </div>`).join('');
  } catch(e) { document.getElementById('spread-results').innerHTML = '<p class="text-sm" style="color:#f87171">搜索失败，请重试</p>'; }
}

function selectProduct(id, title, price) {
  selectedProduct = {id, title, price};
  spreadProductTitle = title;
  document.getElementById('spread-step1').classList.add('hidden');
  document.getElementById('spread-step2').classList.remove('hidden');
  const m = parseFloat(document.getElementById('spread-multiplier').value);
  document.getElementById('spread-selected-info').innerHTML = `<b>${title}</b><br>成本¥${price} → 预计售价¥${(price*m).toFixed(1)}`;
}

async function doSpread() {
  if (!selectedProduct) return;
  document.getElementById('spread-step2').classList.add('hidden');
  document.getElementById('spread-step3').classList.remove('hidden');
  const m = parseFloat(document.getElementById('spread-multiplier').value);
  try {
    const res = await fetch(API + '/api/v1/products/spread', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sourceProductId:selectedProduct.id,sourcePlatform:'1688',priceRule:{type:'MULTIPLIER',value:m}})
    });
    const d = await res.json();
    const taskId = d.data?.taskId;
    if (!taskId) { alert('铺货失败: ' + (d.message||'未知错误')); resetSpread(); return; }
    const poll = setInterval(async()=>{
      try {
        const r = await fetch(API + '/api/v1/products/spread-task/' + taskId);
        const t = await r.json();
        const progress = t.data?.progress || 0;
        const status = t.data?.status || 'PROCESSING';
        document.getElementById('spread-progress').style.width = progress + '%';
        document.getElementById('spread-status-text').textContent = status + ' (' + progress + '%)';
        if (status === 'COMPLETED' || status === 'SUCCESS') {
          clearInterval(poll);
          document.getElementById('spread-step3').classList.add('hidden');
          document.getElementById('spread-step4').classList.remove('hidden');
          document.getElementById('spread-product-name').textContent = spreadProductTitle;
        }
      } catch(e) { clearInterval(poll); alert('轮询失败'); }
    }, 800);
  } catch(e) { alert('铺货请求失败: ' + e.message); resetSpread(); }
}

function goGenerateNote() {
  closeSpreadModal();
  showNoteModal();
  if (spreadProductTitle) {
    document.getElementById('note-title').value = spreadProductTitle;
  }
}

function goGenerateNoteWithProduct(title) {
  switchTab('content');
  showNoteModal();
  document.getElementById('note-title').value = title;
}

// ============ 笔记生成（多版本测款） ============
function showNoteModal() {
  document.getElementById('note-modal').classList.add('show');
  document.getElementById('note-form').classList.remove('hidden');
  document.getElementById('note-loading').classList.add('hidden');
  document.getElementById('note-results').classList.add('hidden');
  loadProductSelect();
  updateAudienceStyle();
}

function closeNoteModal() { document.getElementById('note-modal').classList.remove('show'); multiVersions = []; }

function loadProductSelect() {
  const sel = document.getElementById('note-product-select');
  sel.innerHTML = '<option value="">-- 手动输入商品名 --</option>';
  productCache.forEach(p => {
    sel.innerHTML += '<option value="' + (p.title||'').replace(/"/g,'&quot;') + '">' + (p.title||'').substring(0,30) + '</option>';
  });
}

function onProductSelect() {
  const val = document.getElementById('note-product-select').value;
  if (val) document.getElementById('note-title').value = val;
}

function getCheckedValues(containerId) {
  const checks = document.querySelectorAll('#' + containerId + ' input[type="checkbox"]:checked');
  return Array.from(checks).map(c => c.value);
}

function updateAudienceStyle() {
  const audiences = getCheckedValues('audience-checkboxes');
  const styles = getCheckedValues('style-checkboxes');
  const count = audiences.length * styles.length;
  document.getElementById('version-preview').textContent = '预计生成 ' + count + ' 个版本（' + audiences.length + ' 人群 × ' + styles.length + ' 风格）';
}

async function generateMultiNotes() {
  const title = document.getElementById('note-title').value.trim();
  if (!title) { alert('请输入商品名称'); return; }
  const audiences = getCheckedValues('audience-checkboxes');
  const styles = getCheckedValues('style-checkboxes');
  if (audiences.length === 0 || styles.length === 0) { alert('请至少选择一个人群和一个风格'); return; }

  document.getElementById('note-form').classList.add('hidden');
  document.getElementById('note-loading').classList.remove('hidden');

  try {
    const res = await fetch(API + '/api/v1/notes/generate-multi', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({productTitle:title,audiences,styles,antiAiLevel:'MEDIUM'})
    });
    const d = await res.json();
    if (d.code === 0 && d.data?.versions) {
      multiVersions = d.data.versions;
      renderVersions();
    } else {
      // fallback: 单版本模式
      const singleRes = await fetch(API + '/api/v1/notes/generate', {
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({productTitle:title,style:styles[0],targetAudience:audiences[0],antiAiLevel:'MEDIUM'})
      });
      const sd = await singleRes.json();
      if (sd.code === 0 && sd.data) {
        multiVersions = [{title:sd.data.title,content:sd.data.content,style:styles[0],targetAudience:audiences[0],topics:sd.data.topics||[]}];
        renderVersions();
      } else {
        alert('生成失败: ' + (sd.message||'未知错误'));
        document.getElementById('note-form').classList.remove('hidden');
        document.getElementById('note-loading').classList.add('hidden');
      }
    }
  } catch(e) {
    alert('请求失败: ' + e.message);
    document.getElementById('note-form').classList.remove('hidden');
    document.getElementById('note-loading').classList.add('hidden');
  }
}

function renderVersions() {
  document.getElementById('note-loading').classList.add('hidden');
  document.getElementById('note-results').classList.remove('hidden');
  document.getElementById('note-results-title').textContent = '共生成 ' + multiVersions.length + ' 个版本';

  const styleMap = {grass_planting:'种草推荐',review:'真实测评',tutorial:'教程攻略'};
  const audMap = {student:'学生党',office:'上班族',mom:'宝妈',fashion:'潮流青年',general:'通用'};

  document.getElementById('note-version-list').innerHTML = multiVersions.map((v,i) => `
    <div class="version-card">
      <h4>
        <span>📝 版本${i+1}: ${(v.title||'').substring(0,25)}</span>
        <span class="text-sm">${audMap[v.targetAudience]||v.targetAudience} · ${styleMap[v.style]||v.style}</span>
      </h4>
      <div class="meta">人群: ${audMap[v.targetAudience]||v.targetAudience} | 风格: ${styleMap[v.style]||v.style}</div>
      <div class="content">${v.content||''}</div>
      <div class="actions">
        <button class="btn btn-sm btn-primary" onclick="adoptVersion(${i})">✅ 采纳发布</button>
        <button class="btn btn-sm btn-outline" onclick="editVersion(${i})">✏️ 编辑</button>
        <button class="btn btn-sm btn-outline" onclick="regenerateVersion(${i},'style')">🔄 换风格</button>
        <button class="btn btn-sm btn-outline" onclick="regenerateVersion(${i},'audience')">👥 换人群</button>
        <button class="btn btn-sm btn-outline" onclick="regenerateVersion(${i},'full')">🔁 重新生成</button>
        <button class="btn btn-sm btn-green" onclick="showChatInput(${i})">💬 对话修改</button>
      </div>
    </div>
  `).join('');
}

async function adoptVersion(idx) {
  const v = multiVersions[idx];
  if (!v) return;
  try {
    const res = await fetch(API + '/api/v1/notes/adopt', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:v.title,content:v.content,topics:v.topics||[],style:v.style,targetAudience:v.targetAudience,antiAiLevel:'MEDIUM'})
    });
    const d = await res.json();
    if (d.code === 0) {
      alert('✅ 笔记已采纳发布！');
      closeNoteModal();
      loadNotes();
    } else {
      alert('采纳失败: ' + (d.message||'未知错误'));
    }
  } catch(e) { alert('请求失败: ' + e.message); }
}

function editVersion(idx) {
  editingVersion = idx;
  const v = multiVersions[idx];
  document.getElementById('edit-title').value = v.title || '';
  document.getElementById('edit-content').value = v.content || '';
  document.getElementById('edit-modal').classList.add('show');
}

function saveEdit() {
  if (editingVersion === null) return;
  multiVersions[editingVersion].title = document.getElementById('edit-title').value;
  multiVersions[editingVersion].content = document.getElementById('edit-content').value;
  document.getElementById('edit-modal').classList.remove('show');
  renderVersions();
  editingVersion = null;
}

async function regenerateVersion(idx, mode) {
  const v = multiVersions[idx];
  const title = document.getElementById('note-title').value.trim();
  const allAudiences = ['student','office','mom','fashion','general'];
  const allStyles = ['grass_planting','review','tutorial'];

  let targetAudience = v.targetAudience;
  let targetStyle = v.style;

  if (mode === 'audience') {
    const others = allAudiences.filter(a => a !== v.targetAudience);
    targetAudience = others[Math.floor(Math.random() * others.length)];
  } else if (mode === 'style') {
    const others = allStyles.filter(s => s !== v.style);
    targetStyle = others[Math.floor(Math.random() * others.length)];
  } else {
    targetAudience = allAudiences[Math.floor(Math.random() * allAudiences.length)];
    targetStyle = allStyles[Math.floor(Math.random() * allStyles.length)];
  }

  try {
    const res = await fetch(API + '/api/v1/notes/generate', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({productTitle:title,style:targetStyle,targetAudience,antiAiLevel:'MEDIUM'})
    });
    const d = await res.json();
    if (d.code === 0 && d.data) {
      multiVersions[idx] = {...d.data, style:targetStyle, targetAudience};
      renderVersions();
    } else {
      alert('重新生成失败');
    }
  } catch(e) { alert('请求失败: ' + e.message); }
}

// ============ 多轮对话修改 ============
let chatSessionMap = {}; // idx -> sessionId

function showChatInput(idx) {
  const card = document.querySelectorAll(".version-card")[idx];
  if (!card) return;
  // 如果已有聊天区域则聚焦
  const existing = card.querySelector(".chat-area");
  if (existing) { existing.querySelector("input").focus(); return; }
  
  const chatHtml = `<div class="chat-area" style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px">
    <div class="chat-history" id="chat-history-${idx}" style="max-height:200px;overflow-y:auto;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px">
      <input id="chat-input-${idx}" placeholder="输入修改意见，如：语气再活泼一些、加入价格对比..." style="flex:1" onkeydown="if(event.key===\Enter)sendChatFeedback(${idx})">
      <button class="btn btn-sm btn-primary" onclick="sendChatFeedback(${idx})">发送</button>
    </div>
    <p class="text-sm" style="margin-top:4px;opacity:0.6">💡 可多轮修改，满意后点"采纳发布"</p>
  </div>`;
  card.insertAdjacentHTML("beforeend", chatHtml);
  card.querySelector(".chat-area input").focus();
}

async function sendChatFeedback(idx) {
  const input = document.getElementById("chat-input-" + idx);
  const feedback = input.value.trim();
  if (!feedback) return;
  
  const v = multiVersions[idx];
  const sessionId = v.sessionId || chatSessionMap[idx];
  if (!sessionId) { alert("该版本无会话ID，请重新生成"); return; }
  
  // 显示用户消息
  const history = document.getElementById("chat-history-" + idx);
  history.innerHTML += `<div style="margin-bottom:6px"><span style="color:#a78bfa;font-size:11px">你：</span><span style="font-size:12px">${feedback}</span></div>`;
  input.value = "";
  input.disabled = true;
  history.innerHTML += `<div id="chat-loading-${idx}" style="margin-bottom:6px;font-size:12px;color:#94a3b8">🤖 AI修改中...</div>`;
  history.scrollTop = history.scrollHeight;
  
  try {
    const res = await fetch(API + "/api/v1/notes/chat", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ sessionId, feedback })
    });
    const d = await res.json();
    const loading = document.getElementById("chat-loading-" + idx);
    if (loading) loading.remove();
    
    if (d.code === 0 && d.data) {
      // 更新版本内容
      multiVersions[idx].title = d.data.title || multiVersions[idx].title;
      multiVersions[idx].content = d.data.content || multiVersions[idx].content;
      multiVersions[idx].topics = d.data.topics || multiVersions[idx].topics;
      
      history.innerHTML += `<div style="margin-bottom:6px"><span style="color:#4ade80;font-size:11px">AI：</span><span style="font-size:12px">${d.data.changeNote || "已修改"}</span></div>`;
      
      // 更新卡片内容显示
      const card = document.querySelectorAll(".version-card")[idx];
      const contentDiv = card.querySelector(".content");
      if (contentDiv) contentDiv.textContent = d.data.content || "";
      const h4span = card.querySelector("h4 span:first-child");
      if (h4span) h4span.textContent = "📝 版本" + (idx+1) + ": " + (d.data.title||"").substring(0,25);
      
      history.innerHTML += `<div style="margin-bottom:6px;padding:8px;background:rgba(74,222,128,0.1);border-radius:6px;font-size:11px;color:#4ade80">✅ 第${d.data.round||"?"}轮修改完成，可继续反馈或采纳</div>`;
    } else {
      history.innerHTML += `<div style="color:#f87171;font-size:12px">❌ ${d.message || "修改失败"}</div>`;
    }
  } catch(e) {
    const loading = document.getElementById("chat-loading-" + idx);
    if (loading) loading.remove();
    history.innerHTML += `<div style="color:#f87171;font-size:12px">❌ 请求失败: ${e.message}</div>`;
  }
  input.disabled = false;
  input.focus();
  history.scrollTop = history.scrollHeight;
}
// ============ 初始化 ============
loadDashboard();
</script>
